<script>

// =======================
// 🔐 BLOKADA PODWÓJNEGO LOAD
// =======================
let SESSION_LOADED = false;


// =======================
// 🔁 OBSŁUGA SESJI
// =======================
async function loadSession() {
  try {
    const session = await getSession();
    if(!session){
      showAuth();
      return;
    }

    showApp(session.user?.email || 'zalogowany');

    // 🔥 tylko najważniejsze na start
    await loadStock();
    await loadInvoices(true);

    // 🔥 przywróć ostatni kafelek
    await restoreActiveTab();

  } catch (e) {
    console.error(e);
  }
}


// =======================
// 🔐 SUPABASE AUTH LISTENER
// =======================
supabase.auth.onAuthStateChange((event, session) => {
  if(!SESSION_LOADED && session){
    SESSION_LOADED = true;
    loadSession();
  }
});


// =======================
// 🔘 OBSŁUGA KAFELKÓW
// =======================
document.querySelectorAll('[data-target]').forEach(link => {

  link.addEventListener('click', async (e) => {
    e.preventDefault();

    const target = link.dataset.target;

    // 🔥 zapisz aktywny kafelek
    if(target !== 'stockSection'){
      localStorage.setItem('activeTab', target);
    }

    // ukryj wszystko
    document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));

    // pokaż wybrany
    const section = document.getElementById(target);
    if(section){
      section.classList.remove('hidden');
    }

    // 🔥 doładuj dane tylko gdy trzeba
    if(target === 'ordersSection'){
      await loadOrders();
    }

    if(target === 'invoicesSection'){
      await loadInvoices(false);
    }

  });

});


// =======================
// 🔄 PRZYWRACANIE KAFELKA
// =======================
async function restoreActiveTab(){
  const target = localStorage.getItem('activeTab');

  if(!target) return;

  // ukryj wszystko
  document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));

  // pokaż wybrany
  const section = document.getElementById(target);
  if(section){
    section.classList.remove('hidden');
  }

  // 🔥 doładuj dane tylko gdy trzeba
  if(target === 'ordersSection'){
    await loadOrders();
  }

  if(target === 'invoicesSection'){
    await loadInvoices(false);
  }
}


// =======================
// 🔑 LOGIN (ważne)
// =======================
async function login(email, password){
  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  SESSION_LOADED = true;
  await loadSession();
}

</script>
